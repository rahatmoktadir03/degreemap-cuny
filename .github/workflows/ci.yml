name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install root deps
        run: npm ci

      - name: Build server
        run: |
          cd server
          npm ci
          npm run build

      - name: Build client
        run: |
          cd client
          npm ci
          npm run build

      - name: Run TypeScript checks
        run: |
          npm run -w client run type-check || true
